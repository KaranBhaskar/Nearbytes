<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Nearby Bites</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="auth-page-shell">
      <header class="topbar card auth-topbar">
        <div>
          <h1>Nearby Bites</h1>
          <p class="muted">Sign in or create an account, then return to where you left off.</p>
        </div>

        <div class="user-controls">
          <button id="theme-toggle" class="btn btn-outline" type="button">🌙 Dark Mode</button>
          <a id="back-link" class="btn btn-outline" href="/">Back to App</a>
        </div>
      </header>

      <section class="card">
        <div class="section-title-row">
          <h2>Account Access</h2>
          <p id="return-target" class="muted"></p>
        </div>

        <div class="auth-panels">
          <form id="login-form" class="auth-form subcard">
            <h3>Log In</h3>
            <select name="loginMode" required>
              <option value="standard">Customer / Owner</option>
              <option value="moderator">Moderator</option>
            </select>
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <p class="muted auth-helper">
              Moderator access is restricted to the developer account only.
            </p>
            <button type="submit" class="btn btn-primary">Log In</button>
          </form>

          <form id="signup-form" class="auth-form subcard">
            <h3>Sign Up</h3>
            <input name="name" placeholder="Full name" required />
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password (min 8 chars)" required />
            <select name="role" required>
              <option value="customer">Customer</option>
              <option value="owner">Restaurant Owner</option>
            </select>
            <button type="submit" class="btn btn-primary">Create Account</button>
          </form>
        </div>
      </section>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/auth.js"></script>
  </body>
</html>
